<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ЕГЭ Русский — Структура сочинения</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* Hero */
    .hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 60px 20px 50px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at 30% 50%, rgba(233,69,96,0.08) 0%, transparent 50%),
                  radial-gradient(circle at 70% 50%, rgba(83,144,217,0.08) 0%, transparent 50%);
      animation: heroGlow 8s ease-in-out infinite alternate;
    }
    @keyframes heroGlow {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-5%, 5%); }
    }
    .hero h1 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, #94bbe9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      position: relative;
    }
    .hero p {
      margin-top: 16px;
      font-size: 1.1rem;
      color: #94a3b8;
      position: relative;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Stats bar */
    .stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 20px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-wrap: wrap;
    }
    .stat-item {
      text-align: center;
    }
    .stat-item .num {
      font-size: 1.5rem;
      font-weight: 700;
      color: #94bbe9;
    }
    .stat-item .label {
      font-size: 0.8rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Main */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    /* Flow diagram */
    .flow-title {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 30px;
      color: #94bbe9;
    }
    .flow {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 50px;
      position: relative;
    }
    .flow-item {
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      min-width: 90px;
      position: relative;
      border: 2px solid transparent;
    }
    .flow-item::after {
      content: '→';
      position: absolute;
      right: -14px;
      top: 50%;
      transform: translateY(-50%);
      color: #475569;
      font-size: 1.2rem;
    }
    .flow-item:last-child::after { display: none; }
    .flow-item:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
    .flow-item.active {
      border-color: #e94560;
      box-shadow: 0 0 20px rgba(233,69,96,0.2);
      transform: translateY(-3px);
    }
    .flow-item .badge {
      display: block;
      font-size: 0.65rem;
      opacity: 0.7;
      margin-top: 2px;
      font-weight: 400;
    }
    .flow-item:nth-child(1) { background: linear-gradient(135deg, #1a1a2e, #16213e); color: #a5b4fc; }
    .flow-item:nth-child(2) { background: linear-gradient(135deg, #1a1a2e, #16213e); color: #67e8f9; }
    .flow-item:nth-child(3) { background: linear-gradient(135deg, #1a1a2e, #16213e); color: #6ee7b7; }
    .flow-item:nth-child(4) { background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fde68a; }
    .flow-item:nth-child(5) { background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fca5a5; }
    .flow-item:nth-child(6) { background: linear-gradient(135deg, #1a1a2e, #16213e); color: #c4b5fd; }
    .flow-item:nth-child(7) { background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fbbf24; }
    .flow-item:nth-child(8) { background: linear-gradient(135deg, #1a1a2e, #16213e); color: #e94560; }

    /* Section detail */
    .detail-section {
      margin-top: 20px;
    }
    .detail-card {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-radius: 20px;
      padding: 40px;
      border: 1px solid rgba(255,255,255,0.06);
      animation: fadeUp 0.5s ease;
      display: none;
    }
    .detail-card.visible { display: block; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .detail-card .part-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .detail-card .part-number {
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    .detail-card .part-title {
      font-size: 1.5rem;
      font-weight: 700;
    }
    .detail-card .part-subtitle {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-top: -5px;
    }

    /* Маркер — важный блок */
    .marker {
      background: linear-gradient(135deg, rgba(233,69,96,0.15), rgba(233,69,96,0.05));
      border-left: 4px solid #e94560;
      border-radius: 12px;
      padding: 18px 22px;
      margin: 20px 0;
      position: relative;
    }
    .marker .marker-label {
      display: inline-block;
      background: #e94560;
      color: #fff;
      padding: 2px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .marker p { color: #f1f5f9; line-height: 1.6; font-size: 0.95rem; }
    .marker strong { color: #fff; }

    /* Совет */
    .tip {
      background: linear-gradient(135deg, rgba(251,191,36,0.12), rgba(251,191,36,0.04));
      border-left: 4px solid #fbbf24;
      border-radius: 12px;
      padding: 18px 22px;
      margin: 20px 0;
      position: relative;
    }
    .tip .tip-label {
      display: inline-block;
      background: #fbbf24;
      color: #1a1a2e;
      padding: 2px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .tip p { color: #f1f5f9; line-height: 1.6; font-size: 0.95rem; }
    .tip strong { color: #fff; }

    /* Пример */
    .example {
      background: linear-gradient(135deg, rgba(103,232,249,0.1), rgba(103,232,249,0.03));
      border-left: 4px solid #67e8f9;
      border-radius: 12px;
      padding: 18px 22px;
      margin: 20px 0;
    }
    .example .example-label {
      display: inline-block;
      background: #67e8f9;
      color: #0f172a;
      padding: 2px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .example p { color: #e2e8f0; line-height: 1.6; font-size: 0.95rem; font-style: italic; }

    /* Схема-подсказка */
    .scheme-box {
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      padding: 20px 24px;
      margin: 20px 0;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      color: #c4b5fd;
      line-height: 1.8;
      white-space: pre-wrap;
      border: 1px dashed rgba(196,181,253,0.2);
    }
    .scheme-box .highlight {
      color: #fbbf24;
      font-weight: 700;
    }

    .detail-card p, .detail-card li {
      line-height: 1.8;
      font-size: 0.95rem;
      color: #cbd5e1;
    }
    .detail-card ul, .detail-card ol {
      padding-left: 24px;
      margin: 10px 0;
    }
    .detail-card li { margin: 6px 0; }
    .detail-card h3 {
      color: #94bbe9;
      font-size: 1.1rem;
      margin: 24px 0 10px;
    }
    .detail-card h3:first-of-type { margin-top: 0; }

    /* Кнопка навигации */
    .nav-buttons {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 30px;
    }
    .nav-btn {
      padding: 12px 28px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      background: linear-gradient(135deg, #e94560, #c23152);
      color: #fff;
    }
    .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(233,69,96,0.4); }
    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }
    .nav-btn.prev {
      background: linear-gradient(135deg, #334155, #475569);
    }
    .nav-btn.prev:hover {
      box-shadow: 0 6px 20px rgba(71,85,105,0.4);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 30px;
      color: #475569;
      font-size: 0.85rem;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .flow-item { font-size: 0.75rem; padding: 8px 14px; min-width: 70px; }
      .flow-item::after { display: none; }
      .detail-card { padding: 24px 18px; }
      .nav-buttons { flex-direction: column; }
      .stats { gap: 20px; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f0f1a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }

    /* Порядок частей — checklist */
    .checklist {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
      margin: 20px 0;
    }
    .checklist-item {
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .checklist-item .check-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e94560, #c23152);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.8rem;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>✍ Сочинение ЕГЭ по русскому языку</h1>
    <p>Полный разбор структуры: от вступления до заключения.<br>Кликай на любой блок — получишь подробное объяснение, советы и примеры.</p>
  </div>

  <div class="stats">
    <div class="stat-item"><div class="num">11</div><div class="label">Частей</div></div>
    <div class="stat-item"><div class="num">~350</div><div class="label">Слов</div></div>
    <div class="stat-item"><div class="num">3</div><div class="label">Блока</div></div>
    <div class="stat-item"><div class="num">80</div><div class="label">Мин на экзамене</div></div>
  </div>

  <div class="container">
    <div class="flow-title">Структура сочинения</div>
    <div class="flow" id="flow"></div>

    <div class="detail-section" id="detailSection"></div>
  </div>

  <footer>Сделано с ❤️ для подготовки к ЕГЭ по русскому языку</footer>

  <script>
    const parts = [
      {
        id: 1,
        title: 'Вступление',
        subtitle: 'Формулировка проблемы',
        short: 'Вступление',
        color: '#a5b4fc',
        badge: 'Проблема',
        content: `
          <h3>🎯 Что писать?</h3>
          <p>В первом абзаце ты должен сформулировать <strong>проблему</strong>, которую поднимает автор в тексте. Это самый важный шаг — если проблема определена неверно, всё сочинение полетит в корзину.</p>

          <h3>📌 Как сформулировать проблему?</h3>
          <p>Прочитай текст и спроси себя: <em>"О чём этот текст? Что волнует автора? Какую сторону жизни он показывает?"</em></p>
          <p>Проблема — это <strong>вопрос</strong>, который ставит автор. Её можно записать двумя способами:</p>
          <ul>
            <li><strong>Конструкция «проблема + чего?»</strong> — <em>"Автор поднимает проблему <u>нравственного выбора</u>"</em></li>
            <li><strong>Конструкция «вопрос + о чём?»</strong> — <em>"В предложенном тексте автор размышляет <u>о роли книги в жизни человека</u>"</em></li>
          </ul>

          <div class="marker">
            <div class="marker-label">Маркер</div>
            <p>⚠️ <strong>Типичная ошибка:</strong> многие путают тему и проблему. <u>Тема</u> — это о чём текст (широко), а <u>проблема</u> — какой именно аспект этой темы волнует автора. Например, тема "война", а проблема "как война меняет внутренний мир человека".</p>
          </div>

          <div class="tip">
            <div class="tip-label">Совет</div>
            <p>💡 <strong>Универсальные формулировки:</strong> <em>"В предложенном для анализа тексте автор поднимает проблему..."</em> или <em>"Именно эта проблема привлекла внимание автора..."</em>. Выучи 2-3 шаблона и используй их на экзамене.</p>
          </div>

          <div class="example">
            <div class="example-label">Пример</div>
            <p>«В предложенном тексте Ф.М. Достоевский поднимает проблему <strong>духовного возрождения человека через страдание</strong>. Именно этот вопрос, без сомнения, остаётся актуальным и в наши дни.»</p>
          </div>

          <h3>📝 Объём</h3>
          <p>2-4 предложения. Не пиши слишком длинное вступление — это всего лишь <strong>вход</strong> в сочинение.</p>

          <div class="scheme-box">
<span class="highlight">[Проблема]</span> → о чём текст?<br>
            ↓<br>
<span class="highlight">[Формулировка]</span> → запиши её чётко одной фразой<br>
            ↓<br>
<span class="highlight">[Актуальность]</span> → (по желанию) почему эта проблема важна
          </div>
        `
      },
      {
        id: 2,
        title: 'Комментарий',
        subtitle: 'Первый шаг к анализу текста',
        short: 'Комментарий',
        color: '#67e8f9',
        badge: 'Анализ',
        content: `
          <h3>🎯 Что писать?</h3>
          <p>Здесь ты должен показать, <strong>как именно</strong> автор раскрывает проблему. Это не пересказ! Ты анализируешь, какими примерами, деталями, событиями автор иллюстрирует проблему.</p>

          <div class="marker">
            <div class="marker-label">Маркер</div>
            <p>⚠️ <strong>Важно!</strong> Комментарий — это <u>НЕ пересказ</u>. Если ты просто напишешь "сначала автор сказал то, потом это" — баллы снимут. Нужно показывать, <strong>какими средствами</strong> автор добивается своего: через поступки героев, описания, диалоги, внутренний монолог.</p>
          </div>

          <h3>📌 Структура комментария</h3>
          <p>Комментарий всегда состоит из <strong>двух примеров-иллюстраций</strong> (части 3 и 5) и <strong>двух пояснений</strong> к ним (части 4 и 6). В комментарии ты готовишь почву для этих частей.</p>
          <p>Задай себе вопросы:</p>
          <ul>
            <li>На каком примере автор строит рассуждение?</li>
            <li>Какие детали использует?</li>
            <li>Какой эпизод самый яркий?</li>
          </ul>

          <div class="tip">
            <div class="tip-label">Совет</div>
            <p>💡 <strong>Лайфхак:</strong> Комментарий — самая «дорогая» часть сочинения. За него дают до 5 баллов! Потрать на него максимум времени. Внимательно вчитывайся в текст и ищи <strong>конкретные</strong> детали.</p>
          </div>

          <div class="example">
            <div class="example-label">Пример</div>
            <p>«Размышляя над проблемой, автор обращается к истории главного героя. Писатель <strong>детально описывает</strong> внутреннее состояние персонажа, его сомнения и метания, чтобы читатель мог прочувствовать глубину нравственного конфликта.»</p>
          </div>

          <div class="scheme-box">
<span class="highlight">[Пример №1]</span> → конкретная ситуация из текста<br>
            ↓<br>
<span class="highlight">[Пояснение]</span> → почему автор выбрал именно этот пример<br>
            ↓<br>
<span class="highlight">[Пример №2]</span> → ещё один фрагмент (развитие или контраст)<br>
            ↓<br>
<span class="highlight">[Пояснение]</span> → что показывает этот второй пример
          </div>
        `
      },
      {
        id: 3,
        title: 'Пример-иллюстрация №1',
        subtitle: 'Первый фрагмент текста',
        short: 'Пример №1',
        color: '#6ee7b7',
        badge: 'Факт',
        content: `
          <h3>🎯 Что писать?</h3>
          <p>Приведи <strong>первый конкретный пример</strong> из текста, который иллюстрирует проблему. Это может быть:</p>
          <ul>
            <li>Цитата (небольшая, 1-2 предложения)</li>
            <li>Описание поступка героя</li>
            <li>Важная деталь или эпизод</li>
            <li>Слова автора или героя</li>
          </ul>

          <div class="marker">
            <div class="marker-label">Маркер</div>
            <p>⚠️ <strong>Как оформить цитату?</strong> Если берёшь прямую речь из текста — обязательно указывай номер предложения в скобках. Например: <em>"Автор пишет: «...» (предл. 15)".</em> Если цитируешь не дословно, пиши своими словами, но близко к тексту.</p>
          </div>

          <h3>📌 Как выбрать пример?</h3>
          <ul>
            <li>Выбери самый <strong>яркий</strong> эпизод, связанный с проблемой</li>
            <li>Убедись, что пример действительно <strong>раскрывает</strong> проблему</li>
            <li>Не бери слишком длинные цитаты — 1-2 предложения достаточно</li>
          </ul>

          <div class="tip">
            <div class="tip-label">Совет</div>
            <p>💡 <strong>Клише для примера:</strong> <em>"В подтверждение своей мысли автор приводит пример..."</em>, <em>"Обратимся к тексту: автор описывает..."</em>, <em>"Особого внимания заслуживает эпизод, в котором..."</em></p>
          </div>

          <div class="example">
            <div class="example-label">Пример</div>
            <p>«Так, автор обращает наше внимание на сцену, где главный герой, несмотря на страх, решает заступиться за слабого. Писатель подчёркивает: <em>«…»</em> (предл. 23-25). Эта ситуация наглядно показывает внутреннюю силу персонажа.»</p>
          </div>
        `
      },
      {
        id: 4,
        title: 'Пояснение к примеру №1',
        subtitle: 'Анализ первого фрагмента',
        short: 'Пояснение №1',
        color: '#fde68a',
        badge: 'Анализ',
